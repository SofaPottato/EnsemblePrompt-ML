<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <!-- background dots pattern -->
  <defs>
    <pattern id="dots" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#d8d8d8"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>
  <rect width="1100" height="700" fill="url(#dots)"/>

  <!-- ===== Inputs (orange ellipses, top-left) ===== -->
  <ellipse cx="90"  cy="60"  rx="70" ry="20" fill="#F4B860" stroke="#333"/>
  <text x="90"  y="65"  text-anchor="middle">Task CSV</text>

  <ellipse cx="90"  cy="110" rx="70" ry="20" fill="#F4B860" stroke="#333"/>
  <text x="90"  y="115" text-anchor="middle">Prompt CSV</text>

  <ellipse cx="90"  cy="160" rx="70" ry="20" fill="#F4B860" stroke="#333"/>
  <text x="90"  y="165" text-anchor="middle">raw.csv (resume)</text>

  <!-- dashed grouping like original -->
  <rect x="20" y="35" width="140" height="150" fill="none" stroke="#444" stroke-dasharray="4 3"/>

  <!-- ===== Stage 1: Load functions (red rectangles) ===== -->
  <rect x="220" y="45"  width="170" height="32" fill="#E55A4A" stroke="#333"/>
  <text x="305" y="65"  text-anchor="middle" fill="#fff">loadDataSet()</text>

  <rect x="220" y="95"  width="170" height="32" fill="#E55A4A" stroke="#333"/>
  <text x="305" y="115" text-anchor="middle" fill="#fff">loadPromptTemplate()</text>

  <rect x="220" y="145" width="170" height="32" fill="#E55A4A" stroke="#333"/>
  <text x="305" y="165" text-anchor="middle" fill="#fff">loadCompletedRunKeys()</text>

  <!-- arrows from inputs to loaders -->
  <line x1="160" y1="60"  x2="220" y2="61"  stroke="#444" marker-end="url(#arrow)"/>
  <line x1="160" y1="110" x2="220" y2="111" stroke="#444" marker-end="url(#arrow)"/>
  <line x1="160" y1="160" x2="220" y2="161" stroke="#444" marker-end="url(#arrow)"/>

  <!-- ===== Build stage ===== -->
  <rect x="450" y="95" width="170" height="32" fill="#E55A4A" stroke="#333"/>
  <text x="535" y="115" text-anchor="middle" fill="#fff">buildTaskBatches()</text>

  <line x1="390" y1="61"  x2="450" y2="105" stroke="#444" marker-end="url(#arrow)"/>
  <line x1="390" y1="111" x2="450" y2="111" stroke="#444" marker-end="url(#arrow)"/>
  <line x1="390" y1="161" x2="450" y2="117" stroke="#444" marker-end="url(#arrow)"/>

  <!-- pendingTaskList (yellow ellipse) -->
  <ellipse cx="740" cy="111" rx="75" ry="22" fill="#F6E27A" stroke="#333"/>
  <text x="740" y="116" text-anchor="middle">pendingTaskList</text>
  <line x1="620" y1="111" x2="665" y2="111" stroke="#444" marker-end="url(#arrow)"/>

  <!-- ===== Inference stage ===== -->
  <rect x="900" y="95" width="170" height="32" fill="#E55A4A" stroke="#333"/>
  <text x="985" y="115" text-anchor="middle" fill="#fff">OllamaEngine.run()</text>
  <line x1="815" y1="111" x2="900" y2="111" stroke="#444" marker-end="url(#arrow)"/>

  <!-- raw.csv cylinder (append-only checkpoint) -->
  <g transform="translate(900,200)">
    <ellipse cx="85" cy="0" rx="85" ry="12" fill="#F4B860" stroke="#333"/>
    <path d="M 0 0 L 0 40 A 85 12 0 0 0 170 40 L 170 0" fill="#F4B860" stroke="#333"/>
    <ellipse cx="85" cy="0" rx="85" ry="12" fill="none" stroke="#333"/>
    <text x="85" y="25" text-anchor="middle">raw.csv</text>
  </g>
  <line x1="985" y1="127" x2="985" y2="195" stroke="#444" marker-end="url(#arrow)"/>

  <!-- ===== Parse stage ===== -->
  <rect x="660" y="295" width="170" height="32" fill="#E55A4A" stroke="#333"/>
  <text x="745" y="315" text-anchor="middle" fill="#fff">OutputParser()</text>
  <line x1="900" y1="240" x2="830" y2="311" stroke="#444" marker-end="url(#arrow)"/>

  <!-- singlePromptCmbOutput (yellow cylinder) -->
  <g transform="translate(870,360)">
    <ellipse cx="75" cy="0" rx="75" ry="11" fill="#F6E27A" stroke="#333"/>
    <path d="M 0 0 L 0 36 A 75 11 0 0 0 150 36 L 150 0" fill="#F6E27A" stroke="#333"/>
    <ellipse cx="75" cy="0" rx="75" ry="11" fill="none" stroke="#333"/>
    <text x="75" y="22" text-anchor="middle">singlePromptCmb</text>
  </g>
  <line x1="800" y1="327" x2="900" y2="358" stroke="#444" marker-end="url(#arrow)"/>

  <!-- result.csv (orange cylinder) -->
  <g transform="translate(430,295)">
    <ellipse cx="80" cy="0" rx="80" ry="12" fill="#F4B860" stroke="#333"/>
    <path d="M 0 0 L 0 40 A 80 12 0 0 0 160 40 L 160 0" fill="#F4B860" stroke="#333"/>
    <ellipse cx="80" cy="0" rx="80" ry="12" fill="none" stroke="#333"/>
    <text x="80" y="25" text-anchor="middle">result.csv</text>
  </g>
  <line x1="660" y1="311" x2="595" y2="320" stroke="#444" marker-end="url(#arrow)"/>

  <!-- ===== Process stage ===== -->
  <rect x="220" y="295" width="170" height="32" fill="#E55A4A" stroke="#333"/>
  <text x="305" y="315" text-anchor="middle" fill="#fff">LLMResultProcessor()</text>
  <line x1="430" y1="320" x2="390" y2="315" stroke="#444" marker-end="url(#arrow)"/>

  <!-- partialInfo / fullInfo (yellow cylinders) -->
  <g transform="translate(60,370)">
    <ellipse cx="70" cy="0" rx="70" ry="11" fill="#F6E27A" stroke="#333"/>
    <path d="M 0 0 L 0 36 A 70 11 0 0 0 140 36 L 140 0" fill="#F6E27A" stroke="#333"/>
    <ellipse cx="70" cy="0" rx="70" ry="11" fill="none" stroke="#333"/>
    <text x="70" y="22" text-anchor="middle">partialInfo.csv</text>
  </g>
  <g transform="translate(60,430)">
    <ellipse cx="70" cy="0" rx="70" ry="11" fill="#F6E27A" stroke="#333"/>
    <path d="M 0 0 L 0 36 A 70 11 0 0 0 140 36 L 140 0" fill="#F6E27A" stroke="#333"/>
    <ellipse cx="70" cy="0" rx="70" ry="11" fill="none" stroke="#333"/>
    <text x="70" y="22" text-anchor="middle">fullInfo.csv</text>
  </g>
  <line x1="240" y1="327" x2="170" y2="368" stroke="#444" marker-end="url(#arrow)"/>
  <line x1="240" y1="327" x2="170" y2="428" stroke="#444" marker-end="url(#arrow)"/>

  <!-- ===== Evaluate stage ===== -->
  <rect x="220" y="490" width="170" height="32" fill="#E55A4A" stroke="#333"/>
  <text x="305" y="510" text-anchor="middle" fill="#fff">Evaluate()</text>
  <line x1="130" y1="466" x2="240" y2="490" stroke="#444" marker-end="url(#arrow)"/>

  <!-- Eval outputs (yellow cylinders, right column) -->
  <g transform="translate(500,460)">
    <ellipse cx="70" cy="0" rx="70" ry="11" fill="#F6E27A" stroke="#333"/>
    <path d="M 0 0 L 0 36 A 70 11 0 0 0 140 36 L 140 0" fill="#F6E27A" stroke="#333"/>
    <ellipse cx="70" cy="0" rx="70" ry="11" fill="none" stroke="#333"/>
    <text x="70" y="22" text-anchor="middle">evalSummary.csv</text>
  </g>
  <g transform="translate(700,460)">
    <ellipse cx="80" cy="0" rx="80" ry="11" fill="#F6E27A" stroke="#333"/>
    <path d="M 0 0 L 0 36 A 80 11 0 0 0 160 36 L 160 0" fill="#F6E27A" stroke="#333"/>
    <ellipse cx="80" cy="0" rx="80" ry="11" fill="none" stroke="#333"/>
    <text x="80" y="22" text-anchor="middle">samplesToReview.csv</text>
  </g>
  <g transform="translate(500,540)">
    <ellipse cx="70" cy="0" rx="70" ry="11" fill="#F6E27A" stroke="#333"/>
    <path d="M 0 0 L 0 36 A 70 11 0 0 0 140 36 L 140 0" fill="#F6E27A" stroke="#333"/>
    <ellipse cx="70" cy="0" rx="70" ry="11" fill="none" stroke="#333"/>
    <text x="70" y="22" text-anchor="middle">correctnessHeatmap</text>
  </g>
  <g transform="translate(700,540)">
    <ellipse cx="80" cy="0" rx="80" ry="11" fill="#F6E27A" stroke="#333"/>
    <path d="M 0 0 L 0 36 A 80 11 0 0 0 160 36 L 160 0" fill="#F6E27A" stroke="#333"/>
    <ellipse cx="80" cy="0" rx="80" ry="11" fill="none" stroke="#333"/>
    <text x="80" y="22" text-anchor="middle">confusionMatrix PNG</text>
  </g>

  <line x1="390" y1="500" x2="500" y2="475" stroke="#444" marker-end="url(#arrow)"/>
  <line x1="390" y1="505" x2="700" y2="475" stroke="#444" marker-end="url(#arrow)"/>
  <line x1="390" y1="515" x2="500" y2="555" stroke="#444" marker-end="url(#arrow)"/>
  <line x1="390" y1="520" x2="700" y2="555" stroke="#444" marker-end="url(#arrow)"/>

  <!-- Stage labels -->
  <text x="305" y="25"  text-anchor="middle" font-weight="bold" fill="#555">Load</text>
  <text x="535" y="80"  text-anchor="middle" font-weight="bold" fill="#555">Build</text>
  <text x="985" y="80"  text-anchor="middle" font-weight="bold" fill="#555">Inference</text>
  <text x="745" y="280" text-anchor="middle" font-weight="bold" fill="#555">Parse</text>
  <text x="305" y="280" text-anchor="middle" font-weight="bold" fill="#555">Process</text>
  <text x="305" y="475" text-anchor="middle" font-weight="bold" fill="#555">Evaluate</text>

  <!-- Title -->
  <text x="550" y="670" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">
    ExperimentPipeline · Load → Build → Inference → Parse → Process → Evaluate
  </text>
</svg>
