# =========================================================================
# LLM 推論主設定檔
# 執行前處理：python preprocess/bc5cdr.py
# =========================================================================

# --- 路徑 ---
paths:
  taskCsvPath:   "data/BCVCDR_example.csv"
  promptCmbPath: "data/example_prompts.csv"
  outputRoot:    "data/example_BCVCDR"

  # 可選 override（未填則用預設檔名，全部放在 outputRoot 底下）
  rawOutputPath:            "raw.csv"
  resultPath:               "result.csv"
  singlePromptCmbOutputDir: "singleOutput"
  partialInfoPath:          "partialInfo.csv"
  fullInfoPath:             "fullInfo.csv"
  promptPreviewPath:        "promptPreview.csv"
  evalDir:                  "eval"


# --- Prompt 模板 ---
# contextColumns：Task CSV 中對應 taskTemplate 佔位符的欄位名稱
contextColumns: ["title", "abstract"]
taskTemplate: |
  Title: {title}
  Abstract: {abstract}

  Task: Determine if the Chemical induces the Disease for the following pairs based strictly on the text.
  For each pair, answer with exactly one of the allowed labels: no, yes.

  Pairs to analyze:
  {pairs}
pairColumns: ["e1", "e2"] # pairColumns：pairs JSON 中對應 pairTemplate 佔位符的欄位名稱
pairTemplate: |
  {i}: Chemical: {e1} | Disease: {e2}
# --- 分類設定 ---
# 二元範例: ["True","False"]　多分類範例: ["negative","neutral","positive"]
labelSet: ["no", "yes"]
maxPairsPerBatch: 10      # 每個 LLM task 包含的 item 數





# --- Ollama 連線 ---
selectedModels: ["llama3.2:1b"]
ollamaServer:
  url:     "http://localhost:11434/api/chat"
  timeout: 600 #多久會停止等待 Ollama 回應（秒）

# --- 推論參數 ---
llmOptions:
  temperature:    0
  num_predict:    512
  num_ctx:        8192
  num_gpu:        99
  repeat_penalty: 1.1  # 重複懲罰係數；>1 抑制重複輸出

# --- 並發控制 ---
concurrencyPerModel: 2 #每個模型同時處理多少個 task（不含 Ollama 內部的並發控制）
maxConcurrentModels: 1 #同時載入多少模型（不含 Ollama 內部的並發控制）
