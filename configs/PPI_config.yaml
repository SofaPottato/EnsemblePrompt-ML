# =========================================================================
# LLM PPI (Protein-Protein Interaction) 推論設定檔
# 資料集：LLL（單句，PROTEIN1/PROTEIN2 已嵌入句中）
# 前處理：python preprocess/lll.py  （將 LLL-test.csv → data/LLL/tasks.csv）
# =========================================================================

# --- 路徑 ---
paths:
  taskCsvPath:   'exampleData\PPI_example.csv'
  promptCmbPath: 'exampleData\example_prompts.csv'
  outputRoot:    'exampleData\PPI'               # 所有推論結果的根輸出目錄

  rawOutputPath:            "raw.csv"          # 模型原始回應（未解析）
  promptPreviewPath:        "promptPreview.csv" # 用於人工檢視的 prompt 預覽檔
  resultPath:               "result.csv"       # 解析後的最終預測結果
  singlePromptCmbOutputDir: "singleOutput"     # 單一 prompt 組合的輸出子目錄
  partialInfoPath:          "partialInfo.csv"  # 含部分推論資訊的中間結果
  fullInfoPath:             "fullInfo.csv"     # 含完整推論資訊的詳細結果
  evalDir:                  "eval"             # 評估指標（F1、Precision 等），Matrix 的輸出目錄


# --- Prompt 模板 ---
# contextColumns：Task CSV 中對應 taskTemplate 佔位符的欄位名稱
contextColumns: ["passage"]  # 填入 {passage} 佔位符的來源欄位
taskTemplate: |
  Sentence: {passage}

  Task: Based on the sentence, do PROTEIN1 and PROTEIN2 have a protein-protein interaction (PPI)?
  Answer with exactly one of the allowed labels: no, yes.
pairColumns: []          # 多目標模式下的欄位對清單；single-target 時留空
# --- 分類設定 ---
# 清單索引即整數 code（no=0, yes=1）；gold label 對齊由前處理負責。
# 二元範例: ["no","yes"]　多分類範例: ["negative","neutral","positive"]
labelSet: ["no", "yes"]
# single-target 模式：pairColumns 空 + 指定 labelColumn
# Pipeline 會把 Task CSV 的 label 欄位自動包成 pairs，供下游統一處理
maxPairsPerBatch: 1              # 每批次送入模型的最大樣本對數

labelColumn: "label"     # Task CSV 中作為正解標籤的欄位名稱





# --- Ollama 連線 ---
selectedModels: ["llama3.2:1b", "Qwen","gemma"]  # 使用的 Ollama 模型名稱清單
ollamaServer:
  url:     "http://localhost:11434/api/chat"  # Ollama API 端點位址
  timeout: 600                               # 單次請求的最大等待秒數
# --- 並發控制 ---
concurrencyPerModel: 2  # 每個模型同時發送的最大並發請求數
maxConcurrentModels: 1  # 同時運行推論的最大模型數量
# --- 推論參數 ---
llmOptions:
  temperature:    0    # 取樣隨機性；0 表示完全確定性輸出
  num_predict:    60   # 最多生成的 token 數量
  num_ctx:        8192 # 模型的 context window 大小（token）
  num_gpu:        99   # 使用的 GPU 層數；99 表示盡量全部放 GPU


