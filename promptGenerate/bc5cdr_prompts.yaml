prompts:
#=====================================================================
# BC5CDR (Chemical-Disease) prompt set.
#
# TASK: for EACH Chemical-Disease pair listed in the user prompt, decide
#   whether the Chemical induces the Disease (chemical-induced disease, CID),
#   based strictly on the text.
#
# OUTPUT CONTRACT (enforced by Ollama `format` JSON schema; see
# LabelSet.buildResponseSchemaForTask in llm_modules/schemas.py):
#   The model is constrained to emit EXACTLY
#       {"answers": [{"id": <int>, "label": "no"|"yes"}, ...]}
#   one answer per pair, no free text, no reasoning tokens.
#   LABEL MAPPING (must match labelSet ["no","yes"]):
#       Chemical induces the Disease            -> label = "yes"
#       No induction (incl. treatment / merely  -> label = "no"
#       co-mentioned / negated / speculative)
#   Notes for this batch mode:
#     - The system prompt is shared across ALL pairs in the batch, so every
#       method speaks of "each Chemical-Disease pair", never a single pair.
#     - Constrained decoding leaves no room for visible chain-of-thought, so
#       every method reasons INTERNALLY and emits only the labels. Do NOT ask
#       the model to print spans / lists / rewrites.
#=====================================================================

#============EMO================================
  EMO:
    01: |
      This is very important to my career
    02: |
      If you misclassify a relationship here, it could lead to severe medical errors or endanger lives.
    03: |
      If you make a mistake, I will lose my job.
    04: |
      The accuracy of your classification will directly impact patient safety and treatment outcomes.
    05: |
      Your performance on this task will be a critical factor in my professional reputation and future opportunities in biomedical research.
#============Role================================
  Role:
    01: |
      You are an expert Biocurator for a major biomedical knowledge graph
    02: |
      Act as a Senior Clinical Pharmacologist
    03: |
      You are a Rigorous Scientific Peer Reviewer
    04: |
      You are a meticulous Data Curator for a biomedical database
    05: |
      You are a seasoned Research Scientist specializing in chemical-induced diseases

#============SYSTEM TO ATTENTION=================================
  S2A:
    01: |
      Distill the "objective and non-personal" information from the text. Filter out subjective opinions, market popularity, cost considerations, and irrelevant background. Using only the objective clinical facts, experimental data, and statistical evidence, decide for each Chemical-Disease pair whether the Chemical induces the Disease. Do this reasoning internally and output only the labels (yes = induces, no = does not).
    02: |
      Internally keep only the sentences or clauses that directly describe whether a chemical causes or induces a disease; discard background context, citations, and unrelated entities. Based strictly on that filtered evidence, decide for each Chemical-Disease pair whether the Chemical induces the Disease, then output only the labels (yes / no).
    03: |
      Internally extract only the specific text spans that provide evidence of a chemical inducing a disease, and treat the rest of the text as noise. Using only that evidence, classify each Chemical-Disease pair and output only the labels (yes = induces, no = does not).
#============RAR=================================#EXEPLAINALL
  RAR:
    01: |
      Internally rephrase and expand the question to make it precise, then respond with only the labels (yes = induces, no = does not).
    02: |
      Internally rewrite the relevant text into a logical sequence of events describing how each Chemical affects its paired Disease, making the causal links explicit. Use that sequence to decide, for each pair, whether the Chemical induces the Disease, then output only the labels (yes / no).
    03: |
      Internally rephrase and expand the text to make the relationship between each Chemical and its paired Disease explicit and unambiguous. Based on that, decide for each pair whether the Chemical induces the Disease and output only the labels (yes / no).
  #============RE2=================================
  RE2:
    01: |
      Read the text again
    02: |
      Re-read the text a second time to verify whether there is direct evidence that the Chemical induces the Disease, then output only the labels (yes / no)
    03: |
      First, read the text to identify all biological entities mentioned.
      Now, re-read it again, but this time ignore unrelated entities and focus strictly on the syntactic path connecting each Chemical and its paired Disease. Then output only the labels (yes / no).
  #============Self_ASK================================
  Self_ASK:
    01: |
      Are follow-up questions needed here? If yes, work through them internally, then output only the final labels (yes = induces, no = does not).
    02: |
      Before classifying each Chemical-Disease pair, ask yourself internally:
      'Where exactly in the text is the evidence that the Chemical induces the Disease?'
      'Is there any negation word that flips the meaning?'
      'Is the induction stated as a fact, or just a hypothesis?'
      If you cannot find a specific sentence that answers 'yes' to the evidence question, output the label no for that pair. Otherwise output the label yes.
    03: |
      To classify each Chemical-Disease pair, ask yourself internally:
      Does the text explicitly state that the Chemical causes, induces, or leads to the Disease?
      Is the link direct, or only a co-occurrence (or the Chemical merely treating the Disease)?
      Is the statement asserted as a fact, or is it negated / speculative?
      Answer each sub-question internally, then output the label yes only when the Chemical induces the Disease, otherwise no.
  #============Analogical Prompting================================
  AP:
    01: |
      Before deciding, internally recall 3 distinct examples from the biomedical literature where a chemical clearly induces / causes a disease and 3 examples where a chemical and a disease are only co-mentioned or the chemical treats the disease. Use that contrast to classify each Chemical-Disease pair, and output only the labels (yes / no).
    02: |
      Step 1 (internal): Recall a standard, high-quality sentence from a medical journal that establishes a clear chemical-induced disease.
      Step 2 (internal): Map the grammatical roles (Subject, Verb, Object) of the input sentence onto your recalled example.
      Step 3: If the structural mapping aligns and a genuine causation verb links the Chemical and the Disease, output the label yes; if the link is only co-occurrence, speculative, or negated, output the label no.
  #============Contrastive================================
  Contrastive:
    01: |
      Contrastive Learning Examples:
      Incorrect Approach (Superficial): "Chemical X is found in patients with Disease Y, therefore it causes the disease."
      Critique: This ignores confounding variables and lacks a molecular mechanism.
      Correct Approach (Deep Causal): "Chemical X binds to receptor Z, triggering oxidative stress that leads to cell death in tissue Y, as demonstrated in [Study]."
      Strength: This identifies a specific biological pathway and cites evidence.
      Instructions:
      Follow the Correct Approach logic and avoid the Incorrect Approach pitfalls. Classify each Chemical-Disease pair by focusing on direct mechanistic causation rather than mere co-occurrence, then output only the labels (yes = induces, no = does not).
# The demonstrated labels mirror the enforced Ollama JSON schema (one
# "label" per pair) so the model sees the exact target vocabulary.
#   01 = 1-shot, 02 = 3-shot, 03 = 5-shot. The sets are nested (each adds to
#   the previous) so the ONLY variable across the three is the number of
#   demonstrations; they cover induction in animals / dechallenge / overdose
#   for the positive class and the hard negatives (chemical treats the
#   disease, co-mention with no causal link, explicit negation).
  Few_shot:
    01: |
      Example 1:
      Text: "Prolonged administration of Chemical X produced hepatic necrosis (Disease Y) in the treated animals."
      Chemical X - Disease Y -> label: yes
      ---
      Now classify each Chemical-Disease pair below, outputting one label per pair (yes = induces, no = does not):
    02: |
      Example 1:
      Text: "Prolonged administration of Chemical X produced hepatic necrosis (Disease Y) in the treated animals."
      Chemical X - Disease Y -> label: yes
      ---
      Example 2:
      Text: "Chemical X is commonly used to treat Disease Y and was well tolerated."
      Chemical X - Disease Y -> label: no
      ---
      Example 3:
      Text: "Patients on Chemical X developed renal failure (Disease Y), which resolved after withdrawal."
      Chemical X - Disease Y -> label: yes
      ---
      Now classify each Chemical-Disease pair below, outputting one label per pair (yes = induces, no = does not):
    03: |
      Example 1:
      Text: "Prolonged administration of Chemical X produced hepatic necrosis (Disease Y) in the treated animals."
      Chemical X - Disease Y -> label: yes
      ---
      Example 2:
      Text: "Chemical X is commonly used to treat Disease Y and was well tolerated."
      Chemical X - Disease Y -> label: no
      ---
      Example 3:
      Text: "Patients on Chemical X developed renal failure (Disease Y), which resolved after withdrawal."
      Chemical X - Disease Y -> label: yes
      ---
      Example 4:
      Text: "Chemical X and Disease Y were both reported in the cohort, but no causal link was established."
      Chemical X - Disease Y -> label: no
      ---
      Example 5:
      Text: "Chemical X overdose has been reported to cause seizures (Disease Y)."
      Chemical X - Disease Y -> label: yes
      ---
      Now classify each Chemical-Disease pair below, outputting one label per pair (yes = induces, no = does not):
