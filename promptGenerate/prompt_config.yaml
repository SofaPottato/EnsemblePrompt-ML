# =========================================================
# 檔案與路徑設定
# =========================================================
# 來源 Prompt 方法池檔案 (YAML)。
# 此檔案定義所有可用的 Prompt 方法分類 (method) 及其項目，
promptYamlPath: "promptGenerate/prompts.yaml"

# 輸出的 Prompt 組合 CSV (相對路徑，含檔名與副檔名)。
# 即下游 pipeline config 中 paths.promptCmbPath 所讀取的檔案。
promptCmbOutputPath: "data/promptOutput/example_prompts.csv"
# =========================================================
# Prompt 生成模式設定
# =========================================================

# 生成模式開關 (布林值)：
#   true  = 窮舉組合模式 (Auto)：依 autoSettings 自動枚舉所有方法組合。
#   false = 手動指定模式 (Manual)：只生成 manualCombinations 中明確列出的組合。
b_isExhaustiveCmb: true

# --- Auto 模式參數 (僅在 b_isExhaustiveCmb: true 時生效) ---
autoSettings:
  # 要參與組合的方法分類清單：
  #   ['ALLMethod']           → 使用 prompts.yaml 中「所有」方法分類。
  selectedMethods: ['ALLMethod']
  # 下方為「指定分類」的範例寫法，需要時可取消註解並改用此行：
  #selectedMethods: ['EMO', 'Role', 'S2A', 'RAR', 'RE2', 'Self_ASK', 'AP', 'Contrastive']
  maxSize: 2
# --- Manual 模式參數 (僅在 b_isExhaustiveCmb: false 時生效) ---
# 手動指定要生成的 Prompt 組合清單。
# 外層每一個 list 代表「一組」最終 Prompt，內層元素為 Prompt ID。
# Prompt ID 格式為 {方法分類}{兩位數編號}，例如 EMO01、RAR02、S2A01。
# 找不到的 ID 會被跳過並印出警告；整組皆無效則該組不會輸出。
manualCombinations:
  - ['EMO01', 'RAR02']
  - ['S2A01', 'RE201']
