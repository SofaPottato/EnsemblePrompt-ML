<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 2120" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <style>
      .titleText  { font-size: 16px; font-weight: bold; }
      .col        { font-family: Consolas, 'Courier New', monospace; font-size: 13px; fill: #1a4480; }
      .colNew     { font-family: Consolas, 'Courier New', monospace; font-size: 13px; fill: #c62828; font-weight: bold; }
      .colMuted   { font-family: Consolas, 'Courier New', monospace; font-size: 12px; fill: #888; }
      .label      { font-size: 14px; }
      .note       { font-size: 12px; fill: #555; font-style: italic; }
      .stepLabel  { font-size: 14px; font-weight: bold; fill: #880e4f; }
    </style>
  </defs>

  <!-- ============= Stage 1: parsedOutput.csv (long) ============= -->
  <rect x="200" y="20" width="1000" height="160" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="220" y="48" class="titleText" fill="#0d47a1">parsedOutput.csv  (long format — 每筆 [sample × model × prompt] 一列)</text>
  <line x1="220" y1="62" x2="1180" y2="62" stroke="#1976d2" stroke-width="1"/>
  <text x="220" y="88"  class="col">itemID │ model │ promptID │ predLabel │ trueLabel │ rawOutput │ ...其他</text>
  <text x="220" y="112" class="colMuted">─────────────────────────────────────────────────────────────────────</text>
  <text x="220" y="132" class="colMuted">001    │  M_A  │   P01    │    1      │   "yes"    │   "..."   │</text>
  <text x="220" y="150" class="colMuted">001    │  M_A  │   P02    │    0      │   "yes"    │   "..."   │</text>
  <text x="220" y="168" class="colMuted">001    │  M_B  │   P01    │    1      │   "yes"    │   "..."   │</text>

  <!-- arrow + prepareDf -->
  <line x1="700" y1="180" x2="700" y2="240" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="480" y="190" width="440" height="32" rx="4" fill="#fce4ec" stroke="#c2185b" stroke-width="1"/>
  <text x="700" y="211" text-anchor="middle" class="stepLabel">LLMResultProcessor._prepareDf</text>

  <!-- ============= Stage 2: After prepareDf ============= -->
  <rect x="200" y="250" width="1000" height="130" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="220" y="278" class="titleText" fill="#0d47a1">inputDf  (仍為 long，新增兩欄)</text>
  <line x1="220" y1="292" x2="1180" y2="292" stroke="#1976d2" stroke-width="1"/>
  <text x="220" y="318" class="col">
    <tspan>itemID │ model │ promptID │ predLabel │ </tspan>
    <tspan class="colNew">trueLabel (1/0/-1)</tspan>
    <tspan> │ </tspan>
    <tspan class="colNew">originalLabel</tspan>
    <tspan> │ rawOutput │ </tspan>
    <tspan class="colNew">runKey</tspan>
  </text>
  <text x="220" y="345" class="note">• trueLabel 由字串標準化為 1 / 0 / -1（依 labelMapConfig 的正負集合）</text>
  <text x="220" y="362" class="note">• originalLabel = 原字串備份；runKey = model + "_" + promptID</text>

  <!-- arrow + pivotData -->
  <line x1="700" y1="380" x2="700" y2="440" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="480" y="390" width="440" height="32" rx="4" fill="#fce4ec" stroke="#c2185b" stroke-width="1"/>
  <text x="700" y="411" text-anchor="middle" class="stepLabel">LLMResultProcessor._pivotData</text>
  <text x="700" y="436" text-anchor="middle" class="note">index = 全欄 ∖ {model, promptID, runKey, predLabel, rawOutput}   │   columns = runKey</text>

  <!-- ============= Stage 3: pivotDf / fullPivotDf ============= -->
  <rect x="100" y="460" width="1200" height="190" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="120" y="488" class="titleText" fill="#0d47a1">pivotDf  (long → wide — 每個 sample 一列)</text>
  <line x1="120" y1="502" x2="1280" y2="502" stroke="#1976d2" stroke-width="1"/>
  <text x="120" y="527" class="col">
    <tspan>itemID │ trueLabel │ originalLabel │ ... │ </tspan>
    <tspan class="colNew">M_A_P01</tspan>
    <tspan> │ </tspan>
    <tspan class="colNew">M_A_P02</tspan>
    <tspan> │ </tspan>
    <tspan class="colNew">M_B_P01</tspan>
    <tspan>    ← predLabel 展開成欄</tspan>
  </text>
  <text x="120" y="551" class="colMuted">001    │     1     │     "yes"     │     │    1    │    0    │    1   </text>
  <text x="120" y="569" class="colMuted">002    │     0     │     "no"      │     │    0    │    1    │    0   </text>

  <line x1="120" y1="585" x2="1280" y2="585" stroke="#1976d2" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="120" y="608" class="label" fill="#0d47a1"><tspan font-weight="bold">fullPivotDf</tspan> = pivotDf 再附加 rawOutput 寬表（欄名加 __raw 後綴）</text>
  <text x="120" y="631" class="col">
    <tspan>... 上述欄 + </tspan>
    <tspan class="colNew">M_A_P01__raw</tspan>
    <tspan> │ </tspan>
    <tspan class="colNew">M_A_P02__raw</tspan>
    <tspan> │ </tspan>
    <tspan class="colNew">M_B_P01__raw</tspan>
  </text>

  <!-- arrow + saveData -->
  <line x1="700" y1="650" x2="700" y2="710" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="480" y="660" width="440" height="32" rx="4" fill="#fce4ec" stroke="#c2185b" stroke-width="1"/>
  <text x="700" y="681" text-anchor="middle" class="stepLabel">LLMResultProcessor._saveData</text>

  <!-- fork lines -->
  <line x1="700" y1="710" x2="400" y2="740" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="710" x2="1000" y2="740" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============= Stage 4a: partialInfo.csv ============= -->
  <rect x="80" y="755" width="620" height="180" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="100" y="783" class="titleText" fill="#1b5e20">partialInfo.csv  (lean — Evaluate 的輸入)</text>
  <line x1="100" y1="797" x2="680" y2="797" stroke="#2e7d32" stroke-width="1"/>
  <text x="100" y="824" class="col">itemID │ trueLabel │ M_A_P01 │ M_A_P02 │ M_B_P01 │ ...</text>
  <text x="100" y="848" class="colMuted">001    │     1     │    1    │    0    │    1    │</text>
  <text x="100" y="866" class="colMuted">002    │     0     │    0    │    1    │    0    │</text>
  <text x="100" y="900" class="note">只保留 itemID + trueLabel + runKey 預測欄，</text>
  <text x="100" y="918" class="note">讓下游拿到「乾淨的預測矩陣」。</text>

  <!-- ============= Stage 4b: fullInfo.csv ============= -->
  <rect x="720" y="755" width="600" height="180" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="740" y="783" class="titleText" fill="#1b5e20">fullInfo.csv  (full — 人工檢視用)</text>
  <line x1="740" y1="797" x2="1300" y2="797" stroke="#2e7d32" stroke-width="1"/>
  <text x="740" y="824" class="col">欄位順序：</text>
  <text x="740" y="848" class="col">itemID → originalLabel, trueLabel</text>
  <text x="740" y="868" class="col">→ {runKey}__raw    (原始 LLM 輸出)</text>
  <text x="740" y="888" class="col">→ {runKey}         (解析後的 predLabel)</text>
  <text x="740" y="908" class="col">→ {runKey}__sysPrompt   → 其他 index 欄</text>

  <!-- arrow from partialInfo to Evaluate -->
  <line x1="390" y1="935" x2="390" y2="995" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============= Stage 5: PromptCmbEval box ============= -->
  <rect x="100" y="1000" width="1200" height="490" rx="8" fill="#fffde7" stroke="#f9a825" stroke-width="1.5"/>
  <text x="120" y="1030" class="titleText" fill="#f57f17">PromptCmbEval  (Evaluate.py)</text>
  <line x1="120" y1="1044" x2="1280" y2="1044" stroke="#f9a825" stroke-width="1"/>

  <text x="120" y="1072" class="label" fill="#5d4037"><tspan font-weight="bold">_loadData</tspan>　讀入 partialInfo.csv</text>
  <text x="140" y="1094" class="col">predColNamesList = inputDf.columns ∖ {itemID, trueLabel}   = [M_A_P01, M_A_P02, M_B_P01, ...]</text>
  <text x="140" y="1114" class="col">yTrueLabelSeries = inputDf['trueLabel']</text>

  <line x1="120" y1="1130" x2="1280" y2="1130" stroke="#f9a825" stroke-width="0.5" stroke-dasharray="3 3"/>

  <text x="120" y="1155" class="label" fill="#5d4037"><tspan font-weight="bold">_evalAllPredCols</tspan>　for each runKey ∈ predColNamesList：</text>
  <text x="140" y="1180" class="col">① 過濾 predLabel ∈ {0,1} → 計算 accuracy / precision / recall / f1Score / mcc</text>
  <text x="140" y="1200" class="col">② correctnessMatrix[runKey] = (predLabel == trueLabel).astype(int)　　※ pred=-1 一律判錯</text>
  <text x="140" y="1222" class="note">→ metricsSummaryDf（每個 runKey 一列指標，按 f1Score 排序）</text>
  <text x="140" y="1240" class="note">→ correctnessMatrixDf（每個 sample 對每個 runKey 的對錯：1/0）</text>

  <line x1="120" y1="1255" x2="1280" y2="1255" stroke="#f9a825" stroke-width="0.5" stroke-dasharray="3 3"/>

  <text x="120" y="1280" class="label" fill="#5d4037"><tspan font-weight="bold">_analyzeUpperBound</tspan></text>
  <text x="140" y="1303" class="col">hardSamples = correctnessMatrix.sum(axis=1) == 0 的列　（所有 runKey 都答錯）</text>
  <text x="140" y="1323" class="col">upperBound  = (總樣本 − 難題) / 總樣本</text>

  <line x1="120" y1="1340" x2="1280" y2="1340" stroke="#f9a825" stroke-width="0.5" stroke-dasharray="3 3"/>

  <text x="120" y="1365" class="label" fill="#5d4037"><tspan font-weight="bold">_plotConfusionMatrices</tspan>　每個 runKey 一張 2×2 混淆矩陣（排除 -1）</text>
  <text x="120" y="1395" class="label" fill="#5d4037"><tspan font-weight="bold">_plotHeatmap</tspan>　全體 correctness 熱圖（X=樣本，Y=runKey，綠=對 / 紅=錯）</text>
  <text x="120" y="1425" class="label" fill="#5d4037"><tspan font-weight="bold">_saveResults</tspan>　輸出 CSV</text>

  <!-- arrows to outputs -->
  <line x1="250" y1="1490" x2="250" y2="1540" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="540" y1="1490" x2="540" y2="1540" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="850" y1="1490" x2="850" y2="1540" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1150" y1="1490" x2="1150" y2="1540" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============= Stage 6: Four output boxes ============= -->
  <rect x="60" y="1550" width="380" height="320" rx="8" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="80" y="1578" class="titleText" fill="#e65100">evalSummary.csv</text>
  <line x1="80" y1="1592" x2="420" y2="1592" stroke="#ef6c00" stroke-width="1"/>
  <text x="80" y="1618" class="col">modelPromptID  (即 runKey)</text>
  <text x="80" y="1640" class="col">accuracy</text>
  <text x="80" y="1662" class="col">precision</text>
  <text x="80" y="1684" class="col">recall</text>
  <text x="80" y="1706" class="col">f1Score</text>
  <text x="80" y="1728" class="col">mcc</text>
  <text x="80" y="1750" class="col">validCount</text>
  <text x="80" y="1795" class="note">每個 runKey 一列；</text>
  <text x="80" y="1813" class="note">按 f1Score 由大到小排序。</text>

  <rect x="460" y="1550" width="300" height="320" rx="8" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="480" y="1578" class="titleText" fill="#e65100">samplesToReview.csv</text>
  <line x1="480" y1="1592" x2="740" y2="1592" stroke="#ef6c00" stroke-width="1"/>
  <text x="480" y="1618" class="col">itemID</text>
  <text x="480" y="1640" class="col">trueLabel</text>
  <text x="480" y="1685" class="note">難題清單：</text>
  <text x="480" y="1703" class="note">所有 runKey 都答錯</text>
  <text x="480" y="1721" class="note">的樣本，供人工檢視</text>
  <text x="480" y="1739" class="note">與資料端調整。</text>

  <rect x="780" y="1550" width="300" height="320" rx="8" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="800" y="1578" class="titleText" fill="#e65100">plots/CM{runKey}.png</text>
  <line x1="800" y1="1592" x2="1060" y2="1592" stroke="#ef6c00" stroke-width="1"/>
  <text x="800" y="1618" class="col">每個 runKey 一張</text>
  <text x="800" y="1640" class="col">2 × 2 混淆矩陣</text>
  <text x="800" y="1685" class="note">排除 predLabel = -1，</text>
  <text x="800" y="1703" class="note">用 labels=[0,1] 強制</text>
  <text x="800" y="1721" class="note">2×2 結構（避免某類</text>
  <text x="800" y="1739" class="note">缺預測時矩陣縮小）。</text>

  <rect x="1100" y="1550" width="240" height="320" rx="8" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="1120" y="1578" class="titleText" fill="#e65100">correctnessHeatmap.png</text>
  <line x1="1120" y1="1592" x2="1320" y2="1592" stroke="#ef6c00" stroke-width="1"/>
  <text x="1120" y="1618" class="col">X = 樣本</text>
  <text x="1120" y="1640" class="col">Y = runKey</text>
  <text x="1120" y="1685" class="note">綠 = 答對</text>
  <text x="1120" y="1703" class="note">紅 = 答錯</text>
  <text x="1120" y="1748" class="note">看哪些樣本對哪些</text>
  <text x="1120" y="1766" class="note">prompt 組合是難題。</text>

  <!-- ============= Legend ============= -->
  <rect x="100" y="1920" width="1200" height="160" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1"/>
  <text x="120" y="1946" class="titleText" fill="#424242">Legend</text>
  <line x1="120" y1="1958" x2="1280" y2="1958" stroke="#9e9e9e" stroke-width="0.5"/>

  <rect x="130" y="1972" width="20" height="14" fill="#e3f2fd" stroke="#1976d2"/>
  <text x="160" y="1985" class="label" fill="#0d47a1">中間 DataFrame（in-memory）</text>

  <rect x="430" y="1972" width="20" height="14" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="460" y="1985" class="label" fill="#1b5e20">Processor 落地檔案</text>

  <rect x="700" y="1972" width="20" height="14" fill="#fffde7" stroke="#f9a825"/>
  <text x="730" y="1985" class="label" fill="#f57f17">Evaluate 處理階段</text>

  <rect x="970" y="1972" width="20" height="14" fill="#fff3e0" stroke="#ef6c00"/>
  <text x="1000" y="1985" class="label" fill="#e65100">Evaluate 輸出檔案</text>

  <rect x="130" y="2005" width="20" height="14" fill="#fce4ec" stroke="#c2185b"/>
  <text x="160" y="2018" class="label" fill="#880e4f">程式步驟（method 呼叫）</text>

  <text x="430" y="2018" class="col" fill="#c62828" font-weight="bold">紅色欄名</text>
  <text x="530" y="2018" class="label">＝ 該階段新增 / 變更的欄位</text>

  <text x="430" y="2046" class="col">藍色欄名</text>
  <text x="530" y="2046" class="label">＝ 沿用前一階段的欄位</text>

</svg>
