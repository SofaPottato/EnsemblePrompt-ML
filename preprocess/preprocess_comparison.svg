<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="820" font-family="Microsoft JhengHei, PingFang TC, Noto Sans CJK TC, sans-serif">

  <!-- Background -->
  <rect width="1100" height="820" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1A1A2E">兩種前處理方式的資料結構比較</text>
  <text x="550" y="58" text-anchor="middle" font-size="14" fill="#555">BC5CDR  vs  LLL</text>

  <!-- ══════════ DIVIDER ══════════ -->
  <line x1="30" y1="418" x2="1070" y2="418" stroke="#AAAAAA" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="310" y="407" width="480" height="22" rx="4" fill="#FAFAFA"/>
  <text x="550" y="422" text-anchor="middle" font-size="11" fill="#777" font-style="italic">▲ BC5CDR（Multi-pair）　　　▼ LLL（Single-target）</text>

  <!-- ══════════════════════════════════════
       BC5CDR  ROW  (y: 72 ~ 408)
  ══════════════════════════════════════ -->

  <!-- ── BC5CDR: 原始 CSV ── -->
  <rect x="20" y="72" width="310" height="330" rx="8" fill="#E8F4F8" stroke="#2E86AB" stroke-width="1.5"/>
  <rect x="20" y="72" width="310" height="34" rx="8" fill="#2E86AB"/>
  <rect x="20" y="92" width="310" height="14" fill="#2E86AB"/>
  <text x="175" y="94" text-anchor="middle" font-size="12" font-weight="bold" fill="white">BC5CDR 原始 CSV</text>
  <text x="175" y="110" text-anchor="middle" font-size="10" fill="white">每列 = 一對 entity pair</text>

  <!-- rows -->
  <g font-size="11" fill="#1A1A2E">
    <!-- row stripe -->
    <rect x="22" y="114" width="306" height="22" rx="3" fill="#D4EBF5"/>
    <text x="34" y="129" font-weight="bold" fill="#1A1A2E">ID</text>
    <text x="324" y="129" text-anchor="end" fill="#888">0, 1, 2 …</text>

    <rect x="22" y="138" width="306" height="22" rx="3" fill="#EAF4FA"/>
    <text x="34" y="153" font-weight="bold">PMID</text>
    <text x="324" y="153" text-anchor="end" fill="#888">8701013</text>

    <rect x="22" y="162" width="306" height="22" rx="3" fill="#D4EBF5"/>
    <text x="34" y="177" font-weight="bold">Title</text>
    <text x="324" y="177" text-anchor="end" fill="#555">famotidine-assoc…</text>

    <rect x="22" y="186" width="306" height="22" rx="3" fill="#EAF4FA"/>
    <text x="34" y="201" font-weight="bold">Abstract</text>
    <text x="324" y="201" text-anchor="end" fill="#555">famotidine is a …</text>

    <rect x="22" y="210" width="306" height="22" rx="3" fill="#D4EBF5"/>
    <text x="34" y="225" font-weight="bold">Full_Text</text>
    <text x="324" y="225" text-anchor="end" fill="#999">（含 title 全文）</text>

    <rect x="22" y="234" width="306" height="22" rx="3" fill="#EAF4FA"/>
    <text x="34" y="249" font-weight="bold" fill="#2E86AB">E1_Name</text>
    <text x="324" y="249" text-anchor="end" fill="#2E86AB">famotidine</text>

    <rect x="22" y="258" width="306" height="22" rx="3" fill="#D4EBF5"/>
    <text x="34" y="273" font-weight="bold" fill="#2E86AB">E1_Type</text>
    <text x="324" y="273" text-anchor="end" fill="#2E86AB">chemical</text>

    <rect x="22" y="282" width="306" height="22" rx="3" fill="#EAF4FA"/>
    <text x="34" y="297" font-weight="bold" fill="#2E86AB">E1_MeSH</text>
    <text x="324" y="297" text-anchor="end" fill="#2E86AB">D015738</text>

    <rect x="22" y="306" width="306" height="22" rx="3" fill="#D4EBF5"/>
    <text x="34" y="321" font-weight="bold" fill="#2E86AB">E2_Name</text>
    <text x="324" y="321" text-anchor="end" fill="#2E86AB">delirium</text>

    <rect x="22" y="330" width="306" height="22" rx="3" fill="#EAF4FA"/>
    <text x="34" y="345" font-weight="bold" fill="#2E86AB">E2_Type</text>
    <text x="324" y="345" text-anchor="end" fill="#2E86AB">disease</text>

    <rect x="22" y="354" width="306" height="22" rx="3" fill="#D4EBF5"/>
    <text x="34" y="369" font-weight="bold" fill="#2E86AB">E2_MeSH</text>
    <text x="324" y="369" text-anchor="end" fill="#2E86AB">D003693</text>

    <rect x="22" y="378" width="306" height="22" rx="3" fill="#EAF4FA"/>
    <text x="34" y="393" font-weight="bold" fill="#2E86AB">Relation_Type</text>
    <text x="324" y="393" text-anchor="end" fill="#2E86AB">CID / none</text>
  </g>
  <text x="175" y="412" text-anchor="middle" font-size="9.5" fill="#2E86AB" font-style="italic">同 PMID 的多列 → 合併成一個 task</text>

  <!-- Arrow BC5CDR raw → output -->
  <line x1="335" y1="240" x2="385" y2="240" stroke="#555" stroke-width="2"/>
  <polygon points="385,235 395,240 385,245" fill="#555"/>
  <text x="365" y="228" text-anchor="middle" font-size="10" fill="#555">groupby</text>
  <text x="365" y="240" text-anchor="middle" font-size="10" fill="#555">PMID</text>

  <!-- ── BC5CDR: 輸出 Task CSV ── -->
  <rect x="398" y="72" width="310" height="330" rx="8" fill="#E8F8E8" stroke="#2E86AB" stroke-width="1.5"/>
  <rect x="398" y="72" width="310" height="34" rx="8" fill="#2E86AB"/>
  <rect x="398" y="92" width="310" height="14" fill="#2E86AB"/>
  <text x="553" y="94" text-anchor="middle" font-size="12" font-weight="bold" fill="white">BC5CDR 輸出 Task CSV</text>
  <text x="553" y="110" text-anchor="middle" font-size="10" fill="white">每列 = 一篇文章（PMID）</text>

  <g font-size="11">
    <rect x="400" y="114" width="306" height="22" rx="3" fill="#C8EBC8"/>
    <text x="412" y="129" font-weight="bold" fill="#2E86AB">taskID</text>
    <text x="702" y="129" text-anchor="end" fill="#2E86AB">PMID 字串</text>

    <rect x="400" y="138" width="306" height="22" rx="3" fill="#DCF0DC"/>
    <text x="412" y="153" font-weight="bold" fill="#1A1A2E">title</text>
    <text x="702" y="153" text-anchor="end" fill="#555">文章標題</text>

    <rect x="400" y="162" width="306" height="22" rx="3" fill="#C8EBC8"/>
    <text x="412" y="177" font-weight="bold" fill="#1A1A2E">abstract</text>
    <text x="702" y="177" text-anchor="end" fill="#555">文章摘要</text>

    <!-- pairs 區塊 -->
    <rect x="400" y="186" width="306" height="26" rx="3" fill="#A8D8A8"/>
    <text x="412" y="204" font-weight="bold" fill="#2E86AB">pairs</text>
    <text x="702" y="204" text-anchor="end" fill="#2E86AB">JSON array ↓</text>

    <rect x="400" y="214" width="306" height="184" rx="3" fill="#DCF0DC" stroke="#A8D8A8" stroke-width="1"/>

    <rect x="410" y="222" width="286" height="22" rx="3" fill="#C8EBC8"/>
    <text x="426" y="237" font-size="10.5" fill="#888">itemID</text>
    <text x="690" y="237" text-anchor="end" font-size="10.5" fill="#888">ID 字串</text>

    <rect x="410" y="246" width="286" height="22" rx="3" fill="#DCF0DC"/>
    <text x="426" y="261" font-size="10.5" font-weight="bold" fill="#2E86AB">label</text>
    <text x="690" y="261" text-anchor="end" font-size="10.5" fill="#2E86AB">CID / none</text>

    <rect x="410" y="270" width="286" height="22" rx="3" fill="#C8EBC8"/>
    <text x="426" y="285" font-size="10.5" font-weight="bold" fill="#2E86AB">e1</text>
    <text x="690" y="285" text-anchor="end" font-size="10.5" fill="#2E86AB">E1 實體名稱（化學物質）</text>

    <rect x="410" y="294" width="286" height="22" rx="3" fill="#DCF0DC"/>
    <text x="426" y="309" font-size="10.5" font-weight="bold" fill="#2E86AB">e2</text>
    <text x="690" y="309" text-anchor="end" font-size="10.5" fill="#2E86AB">E2 實體名稱（疾病）</text>

    <!-- bracket showing it repeats -->
    <text x="553" y="348" text-anchor="middle" font-size="10" fill="#888">─── 可有多個 pair（同 PMID）───</text>
    <text x="553" y="368" text-anchor="middle" font-size="19" fill="#AAAAAA">{ … }, { … }</text>
    <text x="553" y="392" text-anchor="middle" font-size="10" fill="#888">每個 pair 對應原始一列</text>
  </g>

  <!-- Arrow BC5CDR output → diff -->
  <line x1="713" y1="240" x2="748" y2="240" stroke="#555" stroke-width="2"/>
  <polygon points="748,235 758,240 748,245" fill="#555"/>

  <!-- ── BC5CDR: 特性 ── -->
  <rect x="760" y="72" width="318" height="330" rx="8" fill="#FFF8E1" stroke="#FFC107" stroke-width="1.8"/>
  <rect x="760" y="72" width="318" height="34" rx="8" fill="#2E86AB"/>
  <rect x="760" y="92" width="318" height="14" fill="#2E86AB"/>
  <text x="919" y="94" text-anchor="middle" font-size="12" font-weight="bold" fill="white">BC5CDR 特性</text>
  <text x="919" y="110" text-anchor="middle" font-size="10" fill="white">Chemical–Disease Extraction</text>

  <g font-size="11.5">
    <text x="778" y="148" fill="#555" font-weight="bold">格式</text>
    <text x="1070" y="148" text-anchor="end" fill="#2E86AB" font-weight="bold">Multi-pair</text>
    <line x1="778" y1="155" x2="1070" y2="155" stroke="#FFE082" stroke-width="1"/>

    <text x="778" y="180" fill="#555" font-weight="bold">粒度</text>
    <text x="1070" y="180" text-anchor="end" fill="#555">文章（PMID）</text>
    <line x1="778" y1="187" x2="1070" y2="187" stroke="#FFE082" stroke-width="1"/>

    <text x="778" y="212" fill="#555" font-weight="bold">pairs 數量</text>
    <text x="1070" y="212" text-anchor="end" fill="#2E86AB">&gt;= 1（JSON array）</text>
    <line x1="778" y1="219" x2="1070" y2="219" stroke="#FFE082" stroke-width="1"/>

    <text x="778" y="244" fill="#555" font-weight="bold">任務類型</text>
    <text x="1070" y="244" text-anchor="end" fill="#555">化學-疾病關係（CDE）</text>
    <line x1="778" y1="251" x2="1070" y2="251" stroke="#FFE082" stroke-width="1"/>

    <text x="778" y="276" fill="#555" font-weight="bold">關係標籤</text>
    <text x="1070" y="276" text-anchor="end" fill="#2E86AB">CID / none</text>
    <line x1="778" y1="283" x2="1070" y2="283" stroke="#FFE082" stroke-width="1"/>

    <text x="778" y="308" fill="#555" font-weight="bold">Entity 資訊</text>
    <text x="1070" y="308" text-anchor="end" fill="#2E86AB">E1（化學）+ E2（疾病）</text>
    <line x1="778" y1="315" x2="1070" y2="315" stroke="#FFE082" stroke-width="1"/>

    <text x="778" y="340" fill="#555" font-weight="bold">附加欄位</text>
    <text x="1070" y="340" text-anchor="end" fill="#888">Type、MeSH ID</text>
    <line x1="778" y1="347" x2="1070" y2="347" stroke="#FFE082" stroke-width="1"/>

    <text x="778" y="372" fill="#555" font-weight="bold">Pipeline pairs</text>
    <text x="1070" y="372" text-anchor="end" fill="#2E86AB">輸出時已打包</text>
  </g>

  <!-- ══════════════════════════════════════
       LLL  ROW  (y: 430 ~ 800)
  ══════════════════════════════════════ -->

  <!-- ── LLL: 原始 CSV ── -->
  <rect x="20" y="430" width="310" height="330" rx="8" fill="#E8F4F8" stroke="#A23B72" stroke-width="1.5"/>
  <rect x="20" y="430" width="310" height="34" rx="8" fill="#A23B72"/>
  <rect x="20" y="450" width="310" height="14" fill="#A23B72"/>
  <text x="175" y="452" text-anchor="middle" font-size="12" font-weight="bold" fill="white">LLL 原始 CSV</text>
  <text x="175" y="468" text-anchor="middle" font-size="10" fill="white">每列 = 一個候選 protein pair</text>

  <g font-size="11">
    <rect x="22" y="472" width="306" height="22" rx="3" fill="#D4EBF5"/>
    <text x="34" y="487" font-weight="bold" fill="#888">（index）</text>
    <text x="324" y="487" text-anchor="end" fill="#888">0, 1, 2 …</text>

    <rect x="22" y="496" width="306" height="22" rx="3" fill="#EAF4FA"/>
    <text x="34" y="511" font-weight="bold">docid</text>
    <text x="324" y="511" text-anchor="end" fill="#888">LLL.d0</text>

    <rect x="22" y="520" width="306" height="22" rx="3" fill="#D4EBF5"/>
    <text x="34" y="535" font-weight="bold" fill="#A23B72">isValid</text>
    <text x="324" y="535" text-anchor="end" fill="#A23B72">TRUE / FALSE</text>

    <rect x="22" y="544" width="306" height="22" rx="3" fill="#EAF4FA"/>
    <text x="34" y="559" font-weight="bold">passage</text>
    <text x="324" y="559" text-anchor="end" fill="#555">"In vivo studies…"</text>

    <rect x="22" y="568" width="306" height="22" rx="3" fill="#D4EBF5"/>
    <text x="34" y="583" font-weight="bold">passageid</text>
    <text x="324" y="583" text-anchor="end" fill="#888">LLL.d0.s0</text>

    <!-- empty rows to match height -->
    <rect x="22" y="592" width="306" height="160" rx="3" fill="#F0F7FB"/>
    <text x="175" y="660" text-anchor="middle" font-size="10" fill="#BBBBBB" font-style="italic">（僅 5 欄）</text>
    <text x="175" y="678" text-anchor="middle" font-size="10" fill="#BBBBBB" font-style="italic">無 entity 類型、MeSH 等附加資訊</text>
    <text x="175" y="696" text-anchor="middle" font-size="10" fill="#BBBBBB" font-style="italic">protein 以 PROTEIN1/PROTEIN2 匿名化</text>
  </g>
  <text x="175" y="770" text-anchor="middle" font-size="9.5" fill="#A23B72" font-style="italic">每列保持獨立，不做合併</text>

  <!-- Arrow LLL raw → output -->
  <line x1="335" y1="600" x2="385" y2="600" stroke="#555" stroke-width="2"/>
  <polygon points="385,595 395,600 385,605" fill="#555"/>
  <text x="365" y="588" text-anchor="middle" font-size="10" fill="#555">iterrows</text>
  <text x="365" y="600" text-anchor="middle" font-size="10" fill="#555">逐列</text>

  <!-- ── LLL: 輸出 Task CSV ── -->
  <rect x="398" y="430" width="310" height="330" rx="8" fill="#E8F8E8" stroke="#A23B72" stroke-width="1.5"/>
  <rect x="398" y="430" width="310" height="34" rx="8" fill="#A23B72"/>
  <rect x="398" y="450" width="310" height="14" fill="#A23B72"/>
  <text x="553" y="452" text-anchor="middle" font-size="12" font-weight="bold" fill="white">LLL 輸出 Task CSV</text>
  <text x="553" y="468" text-anchor="middle" font-size="10" fill="white">每列 = 一個候選 pair（flat 結構）</text>

  <g font-size="11">
    <rect x="400" y="472" width="306" height="22" rx="3" fill="#C8EBC8"/>
    <text x="412" y="487" font-weight="bold" fill="#A23B72">taskID</text>
    <text x="702" y="487" text-anchor="end" fill="#A23B72">passageid_index</text>

    <rect x="400" y="496" width="306" height="22" rx="3" fill="#DCF0DC"/>
    <text x="412" y="511" font-weight="bold" fill="#1A1A2E">passage</text>
    <text x="702" y="511" text-anchor="end" fill="#555">單句文本</text>

    <rect x="400" y="520" width="306" height="22" rx="3" fill="#C8EBC8"/>
    <text x="412" y="535" font-weight="bold" fill="#A23B72">label</text>
    <text x="702" y="535" text-anchor="end" fill="#A23B72">true / false</text>

    <!-- note area -->
    <rect x="400" y="548" width="306" height="204" rx="3" fill="#F0FAF0" stroke="#A8D8A8" stroke-width="1"/>
    <text x="553" y="590" text-anchor="middle" font-size="10" fill="#A23B72" font-weight="bold">★ Pipeline 自動處理</text>
    <text x="553" y="612" text-anchor="middle" font-size="10" fill="#888">Pipeline 讀取 label 欄</text>
    <text x="553" y="630" text-anchor="middle" font-size="10" fill="#888">自動包成 pairs JSON</text>
    <text x="553" y="648" text-anchor="middle" font-size="10" fill="#888">格式：</text>
    <rect x="420" y="658" width="266" height="60" rx="4" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
    <text x="553" y="674" text-anchor="middle" font-size="9.5" fill="#555" font-family="Consolas, monospace">[&#123;</text>
    <text x="553" y="689" text-anchor="middle" font-size="9.5" fill="#A23B72" font-family="Consolas, monospace">  label: "true"</text>
    <text x="553" y="704" text-anchor="middle" font-size="9.5" fill="#555" font-family="Consolas, monospace">&#125;]</text>
    <text x="553" y="732" text-anchor="middle" font-size="10" fill="#AAAAAA" font-style="italic">輸出時 pairs 數量固定為 1</text>
  </g>

  <!-- Arrow LLL output → diff -->
  <line x1="713" y1="600" x2="748" y2="600" stroke="#555" stroke-width="2"/>
  <polygon points="748,595 758,600 748,605" fill="#555"/>

  <!-- ── LLL: 特性 ── -->
  <rect x="760" y="430" width="318" height="330" rx="8" fill="#FFF8E1" stroke="#FFC107" stroke-width="1.8"/>
  <rect x="760" y="430" width="318" height="34" rx="8" fill="#A23B72"/>
  <rect x="760" y="450" width="318" height="14" fill="#A23B72"/>
  <text x="919" y="452" text-anchor="middle" font-size="12" font-weight="bold" fill="white">LLL 特性</text>
  <text x="919" y="468" text-anchor="middle" font-size="10" fill="white">Protein–Protein Interaction</text>

  <g font-size="11.5">
    <text x="778" y="508" fill="#555" font-weight="bold">格式</text>
    <text x="1070" y="508" text-anchor="end" fill="#A23B72" font-weight="bold">Single-target</text>
    <line x1="778" y1="515" x2="1070" y2="515" stroke="#FFE082" stroke-width="1"/>

    <text x="778" y="540" fill="#555" font-weight="bold">粒度</text>
    <text x="1070" y="540" text-anchor="end" fill="#555">句子（passage）</text>
    <line x1="778" y1="547" x2="1070" y2="547" stroke="#FFE082" stroke-width="1"/>

    <text x="778" y="572" fill="#555" font-weight="bold">pairs 數量</text>
    <text x="1070" y="572" text-anchor="end" fill="#A23B72">1（Pipeline 包）</text>
    <line x1="778" y1="579" x2="1070" y2="579" stroke="#FFE082" stroke-width="1"/>

    <text x="778" y="604" fill="#555" font-weight="bold">任務類型</text>
    <text x="1070" y="604" text-anchor="end" fill="#555">蛋白質交互（PPI）</text>
    <line x1="778" y1="611" x2="1070" y2="611" stroke="#FFE082" stroke-width="1"/>

    <text x="778" y="636" fill="#555" font-weight="bold">關係標籤</text>
    <text x="1070" y="636" text-anchor="end" fill="#A23B72">true / false</text>
    <line x1="778" y1="643" x2="1070" y2="643" stroke="#FFE082" stroke-width="1"/>

    <text x="778" y="668" fill="#555" font-weight="bold">Entity 資訊</text>
    <text x="1070" y="668" text-anchor="end" fill="#A23B72">PROTEIN1 / PROTEIN2</text>
    <line x1="778" y1="675" x2="1070" y2="675" stroke="#FFE082" stroke-width="1"/>

    <text x="778" y="700" fill="#555" font-weight="bold">附加欄位</text>
    <text x="1070" y="700" text-anchor="end" fill="#888">無</text>
    <line x1="778" y1="707" x2="1070" y2="707" stroke="#FFE082" stroke-width="1"/>

    <text x="778" y="732" fill="#555" font-weight="bold">Pipeline pairs</text>
    <text x="1070" y="732" text-anchor="end" fill="#A23B72">由 Pipeline 自動包</text>
  </g>

  <!-- ══════════════════════════════════════
       LEGEND / COLUMN GUIDE  (y: 778)
  ══════════════════════════════════════ -->
  <rect x="20" y="778" width="1058" height="34" rx="6" fill="#F0F0F0" stroke="#DDDDDD" stroke-width="1"/>
  <text x="36" y="799" font-size="11" font-weight="bold" fill="#333">欄位說明：</text>
  <rect x="130" y="787" width="12" height="12" rx="2" fill="#2E86AB"/>
  <text x="148" y="799" font-size="10.5" fill="#333">BC5CDR 核心欄位</text>
  <rect x="280" y="787" width="12" height="12" rx="2" fill="#A23B72"/>
  <text x="298" y="799" font-size="10.5" fill="#333">LLL 核心欄位</text>
  <rect x="410" y="787" width="12" height="12" rx="2" fill="#E8F4F8" stroke="#888" stroke-width="1"/>
  <text x="428" y="799" font-size="10.5" fill="#333">原始輸入</text>
  <rect x="520" y="787" width="12" height="12" rx="2" fill="#E8F8E8" stroke="#888" stroke-width="1"/>
  <text x="538" y="799" font-size="10.5" fill="#333">輸出格式</text>
